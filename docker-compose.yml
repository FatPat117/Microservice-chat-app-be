version: "3.9"

services:
  user-db:
    image: postgres:16
    container_name: chatapp-user-db
    environment:
      POSTGRES_USER: ${USER_DB_USER:-chatapp_user_service}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-chatapp_password}
      POSTGRES_DB: ${USER_DB_NAME:-chatapp_user_service}
    ports:
      - ${USER_DB_PORT:-5433}:5432
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - chatapp-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chatapp-rabbitmq
    ports:
      - ${RABBITMQ_PORT:-5672}:5672
      - ${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-chatapp_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-chatapp_password}
    networks:
      - chatapp-network

  auth-db:
    image: mysql:8.0
    container_name: chatapp-auth-db
    environment:
     MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD:-root_password}
     MYSQL_DATABASE: ${AUTH_DB_NAME:-chatapp_auth-service}
     MYSQL_USER: ${AUTH_DB_USER:-chatapp_auth_user}
     MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-chatapp_auth_password}
    command: ["mysqld","--default-authentication-plugin=mysql_native_password"]
    ports:
      - ${AUTH_DB_PORT:-3307}:3306
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - chatapp-network
  
  mongo:
    image: mongo:7
    container_name: chatapp-mongo
    ports:
      - ${MONGO_PORT:-27018}:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-chatapp_root_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-chatapp_root_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-chatapp_database}
    volumes:
      - mongo-data:/data/db
    networks:
      - chatapp-network

  redis:
    image: redis:7
    container_name: chatapp-redis
    ports:
      - ${REDIS_PORT:-6379}:6379
    networks:
      - chatapp-network
    volumes:
      - redis-data:/data

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: chatapp-auth-service
    env_file:
      - services/auth-service/.env
    environment:
      AUTH_DB_URL: mysql://chatapp_auth_user:chatapp_auth_password@chatapp-auth-db:3306/chatapp_auth-service
      AUTH_DB_SSL: "false"
      RABBITMQ_URL: amqp://chatapp_user:chatapp_password@chatapp-rabbitmq:5672/
    depends_on:
      - auth-db
      - rabbitmq
    ports:
      - ${AUTH_SERVICE_PORT:-4003}:4003
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: chatapp-user-service
    env_file:
      - services/user-service/.env
    environment:
      USER_DB_URL: postgresql://chatapp_user_service:chatapp_password@chatapp-user-db:5432/chatapp_user_service
      USER_DB_SSL: "false"
      RABBITMQ_URL: amqp://chatapp_user:chatapp_password@chatapp-rabbitmq:5672/
    depends_on:
      - user-db
      - rabbitmq
    ports:
      - ${USER_SERVICE_PORT:-4001}:4001
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4001/users/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: chatapp-gateway-service
    env_file:
      - services/gateway-service/.env
    environment:
      AUTH_SERVICE_URL: http://chatapp-auth-service:4003
      USER_SERVICE_URL: http://chatapp-user-service:4001
      CHAT_SERVICE_URL: http://chatapp-chat-service:4002
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-super-secret-token}
      JWT_SECRET: ${JWT_SECRET:-super-jwt-secret}
    depends_on:
      - auth-service
      - user-service
    ports:
      - ${GATEWAY_SERVICE_PORT:-4000}:4000
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: chatapp-chat-service
    env_file:
      - services/chat-service/.env
    environment:
      RABBITMQ_URL: amqp://chatapp_user:chatapp_password@chatapp-rabbitmq:5672/
      MONGO_URL: mongodb://chatapp_root_user:chatapp_root_password@chatapp-mongo:27017/chatapp_database?authSource=admin
      REDIS_URL: redis://chatapp-redis:6379
    depends_on:
      - rabbitmq
      - mongo
      - redis
    ports:
      - ${CHAT_SERVICE_PORT:-4002}:4002
    networks:
      - chatapp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
volumes:
  user-db-data:
  auth-db-data:
  mongo-data:
  redis-data:

networks:
  chatapp-network:
    driver: bridge
